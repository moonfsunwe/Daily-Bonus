name: Daily Bonus
 
on:
  push:
    branches:
      - master
  schedule:
    - cron: '30 23 * * *'

jobs:
  checkin:
    strategy:
      matrix:
        os: [self-hosted]
        # os: [ubuntu-latest, self-hosted]

    runs-on: ${{ matrix.os }}

    env:
      V2EX_COOKIES: ${{ secrets.V2EX_COOKIES }}
      BILIBILI_COOKIES: ${{ secrets.BILIBILI_COOKIES }}
      YAMIBO_COOKIES: ${{ secrets.YAMIBO_COOKIES }}
      YURIFANS_EMAIL: ${{ secrets.YURIFANS_EMAIL }}
      YURIFANS_PASSWORD: ${{ secrets.YURIFANS_PASSWORD }}
      PICA_EMAIL: ${{ secrets.PICA_EMAIL }}
      PICA_PASSWORD: ${{ secrets.PICA_PASSWORD }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_USER_ID: ${{ secrets.TG_USER_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 安装基础库，去掉那个搜不到的 imghdr
          python -m pip install setuptools requests beautifulsoup4 cloudscraper python-telegram-bot==13.7 pytz lxml cffi
  
      - name: Check-in
        # 这里的 run 分为三行：第一行是核心补丁，第二行是运行脚本
        run: |
          # 手动在你的 Python 库目录里生成一个空的 imghdr.py，彻底骗过 telegram 库
          python -c "import os; import sys; lib_path = os.path.join(os.path.dirname(os.__file__), 'imghdr.py'); open(lib_path, 'w').write('def what(file, h=None): return None')"
          # 运行签到脚本
          python ./message.py
 
