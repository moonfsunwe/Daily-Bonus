name: Daily Bonus

on:
  push:
    branches:
      - master
  schedule:
    - cron: '30 23 * * *' # 北京时间早上 7:30 自动跑
  workflow_dispatch:      # 允许你在 GitHub 网页上点按钮手动触发

jobs:
  checkin:
    # 彻底放弃 self-hosted，改用 GitHub 官方服务器
    runs-on: ubuntu-latest

    env:
      V2EX_COOKIES: ${{ secrets.V2EX_COOKIES }}
      BILIBILI_COOKIES: ${{ secrets.BILIBILI_COOKIES }}
      YAMIBO_COOKIES: ${{ secrets.YAMIBO_COOKIES }}
      YURIFANS_EMAIL: ${{ secrets.YURIFANS_EMAIL }}
      YURIFANS_PASSWORD: ${{ secrets.YURIFANS_PASSWORD }}
      PICA_EMAIL: ${{ secrets.PICA_EMAIL }}
      PICA_PASSWORD: ${{ secrets.PICA_PASSWORD }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_USER_ID: ${{ secrets.TG_USER_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 使用稳定的 3.10，避免 3.13 的兼容性问题

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check-in with Retry
        # 核心逻辑：如果运行失败，等待并重试，最多 10 次
        run: |
          n=0
          until [ "$n" -ge 10 ]
          do
            python ./message.py && break
            n=$[$n+1]
            echo "签到失败，可能是 GitHub IP 被论坛封锁，等待 30 秒后进行第 $n 次重试..."
            sleep 30
          done
