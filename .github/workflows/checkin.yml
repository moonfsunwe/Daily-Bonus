name: Daily Bonus

on:
  push:
    branches:
      - master
  schedule:
    - cron: '30 23 * * *' # 北京时间早上 7:30 自动跑
  workflow_dispatch:      # 允许你在 GitHub 网页上点按钮手动触发

jobs:
  checkin:
    # 彻底放弃 self-hosted，改用 GitHub 官方服务器
    runs-on: ubuntu-latest

    env:
      V2EX_COOKIES: ${{ secrets.V2EX_COOKIES }}
      BILIBILI_COOKIES: ${{ secrets.BILIBILI_COOKIES }}
      YAMIBO_COOKIES: ${{ secrets.YAMIBO_COOKIES }}
      YURIFANS_EMAIL: ${{ secrets.YURIFANS_EMAIL }}
      YURIFANS_PASSWORD: ${{ secrets.YURIFANS_PASSWORD }}
      PICA_EMAIL: ${{ secrets.PICA_EMAIL }}
      PICA_PASSWORD: ${{ secrets.PICA_PASSWORD }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_USER_ID: ${{ secrets.TG_USER_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 使用稳定的 3.10，避免 3.13 的兼容性问题

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check-in with Retry
        run: |
          n=0
          # 尝试 15 次，增加撞大运的概率
          until [ "$n" -ge 15 ]
          do
            # 运行脚本
            python ./message.py && exit 0
            
            n=$[$n+1]
            # 随机等待 30 到 120 秒，避开 Cloudflare 的频率限制
            wait_time=$((RANDOM % 91 + 30))
            echo "第 $n 次尝试失败（可能是遇到验证码），等待 ${wait_time} 秒后重试..."
            sleep $wait_time
          done
          exit 1
            echo "签到失败，可能是 GitHub IP 被论坛封锁，等待 30 秒后进行第 $n 次重试..."
            sleep 30
          done
